<svg width="680" height="240" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gtxt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="50%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
    <radialGradient id="gglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;display=swap');
    </style>
  </defs>

  <rect width="680" height="240" fill="#0D0D0D"/>

  <!-- Glow -->
  <ellipse cx="340" cy="90" rx="300" ry="80" fill="url(#gglow)" filter="url(#soft)"/>

  <!-- LEXART — Orbitron via foreignObject -->
  <foreignObject x="0" y="10" width="680" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Orbitron',monospace;font-size:86px;font-weight:900;letter-spacing:14px;text-align:center;background:linear-gradient(90deg,#FFB347,#FF6B00,#FF4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;padding-top:10px;">LEXART</div>
  </foreignObject>

  <!-- Séparateur -->
  <line x1="170" y1="134" x2="332" y2="134" stroke="#FF6B00" stroke-width="0.8" stroke-opacity="0.28"/>
  <circle cx="340" cy="134" r="2.5" fill="#0AFFEF" opacity="0.9"/>
  <line x1="348" y1="134" x2="510" y2="134" stroke="#FF6B00" stroke-width="0.8" stroke-opacity="0.28"/>

  <!-- STUDIO — Courier New -->
  <text x="340" y="165"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="20" font-weight="400" letter-spacing="20"
    fill="#FF8C2A" opacity="0.88">STUDIO</text>

  <!-- // Développeur Fullstack _ -->
  <text x="340" y="194"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="13" letter-spacing="3"
    fill="#8A8A8A">
    <tspan fill="#0AFFEF">// </tspan>Développeur Fullstack<tspan fill="#0AFFEF"> _</tspan>
  </text>

  <!-- Micro deco -->
  <g stroke="#FF6B00" stroke-width="0.7" stroke-opacity="0.18">
    <line x1="285" y1="214" x2="320" y2="214"/>
    <line x1="360" y1="214" x2="395" y2="214"/>
  </g>
  <circle cx="340" cy="214" r="2" fill="#FF6B00" opacity="0.22"/>

</svg>
