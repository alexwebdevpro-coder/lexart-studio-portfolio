<svg width="680" height="760" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="gglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gvia" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFD580"/>
      <stop offset="50%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#8B2500"/>
    </radialGradient>
    <linearGradient id="gface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C2A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#CC3D00" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="ghex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
    <linearGradient id="gtxt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="50%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="viafx" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="traceglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="hexclip">
      <polygon points="340,82 478,162 478,322 340,402 202,322 202,162"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="680" height="760" fill="#0D0D0D"/>
  <circle cx="340" cy="242" r="200" fill="url(#gglow)" filter="url(#soft)"/>

  <!-- Outer dashed hex -->
  <polygon points="340,60 504,152 504,336 340,428 176,336 176,152"
    fill="none" stroke="#FF6B00" stroke-width="0.7" stroke-opacity="0.15" stroke-dasharray="6 5"/>

  <!-- Outer ticks -->
  <g stroke="#FF6B00" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
    <line x1="340" y1="60"  x2="340" y2="44"/>
    <line x1="340" y1="428" x2="340" y2="444"/>
    <line x1="504" y1="152" x2="518" y2="144"/>
    <line x1="176" y1="152" x2="162" y2="144"/>
    <line x1="504" y1="336" x2="518" y2="344"/>
    <line x1="176" y1="336" x2="162" y2="344"/>
  </g>

  <!-- Hex glow + face + border -->
  <polygon points="340,82 478,162 478,322 340,402 202,322 202,162"
    fill="#FF5500" opacity="0.07" filter="url(#soft)"/>
  <polygon points="340,82 478,162 478,322 340,402 202,322 202,162"
    fill="url(#gface)"/>
  <polygon points="340,82 478,162 478,322 340,402 202,322 202,162"
    fill="none" stroke="url(#ghex)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Corner triangles -->
  <g fill="#FF6B00" opacity="0.8">
    <polygon points="340,82  357,97  323,97"/>
    <polygon points="478,162 465,178 472,147"/>
    <polygon points="478,322 472,337 465,306"/>
    <polygon points="340,402 323,387 357,387"/>
    <polygon points="202,322 215,306 208,337"/>
    <polygon points="202,162 208,147 215,178"/>
  </g>

  <!-- Edge nodes -->
  <g fill="#FF8C2A">
    <circle cx="378" cy="93"  r="3"/>
    <circle cx="302" cy="93"  r="3"/>
    <circle cx="450" cy="145" r="3"/>
    <circle cx="230" cy="145" r="3"/>
    <circle cx="478" cy="242" r="3.5"/>
    <circle cx="202" cy="242" r="3.5"/>
    <circle cx="450" cy="339" r="3"/>
    <circle cx="230" cy="339" r="3"/>
    <circle cx="378" cy="391" r="3"/>
    <circle cx="302" cy="391" r="3"/>
  </g>

  <!-- Outer PCB branches -->
  <g stroke="#FF6B00" stroke-width="1" stroke-opacity="0.25" fill="none">
    <polyline points="202,182 162,182 162,155 144,155"/>
    <circle cx="144" cy="155" r="3" fill="#FF6B00" fill-opacity="0.4" stroke="none"/>
    <polyline points="478,182 518,182 518,155 536,155"/>
    <circle cx="536" cy="155" r="3" fill="#FF6B00" fill-opacity="0.4" stroke="none"/>
    <polyline points="212,342 172,342 172,370"/>
    <circle cx="172" cy="370" r="3" fill="#FF6B00" fill-opacity="0.4" stroke="none"/>
    <polyline points="468,342 508,342 508,370"/>
    <circle cx="508" cy="370" r="3" fill="#FF6B00" fill-opacity="0.4" stroke="none"/>
    <polyline points="312,86 312,58 340,58"/>
    <polyline points="368,86 368,58"/>
  </g>

  <!-- CIRCUIT INTÉRIEUR -->
  <g clip-path="url(#hexclip)">

    <!-- Glow traces -->
    <g stroke="#FF6B00" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.15" filter="url(#traceglow)">
      <polyline points="215,205 252,205 252,235 283,235 283,255" stroke-width="5"/>
      <polyline points="370,93 370,140 348,140 348,175 340,175 340,218" stroke-width="4"/>
      <polyline points="452,148 452,185 420,185 420,222 402,222 402,255" stroke-width="4"/>
      <polyline points="478,272 442,272 442,252 408,252 408,255" stroke-width="4"/>
      <polyline points="310,391 310,355 332,355 332,318 312,318 312,285 338,285 338,272 358,272 358,255" stroke-width="4"/>
      <polyline points="228,318 260,318 260,288 284,288 284,272 302,272 302,255" stroke-width="4"/>
    </g>

    <!-- Traces principales -->
    <g stroke="#FF7A1A" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="215,205 252,205 252,235 283,235 283,255" stroke-width="2" stroke-opacity="0.75"/>
      <polyline points="370,93 370,140 348,140 348,175 340,175 340,218" stroke-width="1.6" stroke-opacity="0.68"/>
      <polyline points="452,148 452,185 420,185 420,222 402,222 402,255" stroke-width="1.5" stroke-opacity="0.65"/>
      <polyline points="478,272 442,272 442,252 408,252 408,255" stroke-width="2" stroke-opacity="0.72"/>
      <polyline points="310,391 310,355 332,355 332,318 312,318 312,285 338,285 338,272 358,272 358,255" stroke-width="1.4" stroke-opacity="0.62"/>
      <polyline points="228,318 260,318 260,288 284,288 284,272 302,272 302,255" stroke-width="1.3" stroke-opacity="0.58"/>
    </g>

    <!-- Traces fines -->
    <g stroke="#FFB347" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="0.9" stroke-opacity="0.28">
      <polyline points="252,235 265,235 265,252 280,252"/>
      <polyline points="348,175 362,175 362,200 348,200 348,218"/>
      <polyline points="420,222 406,222 406,238 396,238"/>
      <polyline points="312,285 295,285 295,268 308,268"/>
    </g>

    <!-- Via 1 haut-gauche -->
    <circle cx="283" cy="196" r="9" fill="#FF6B00" fill-opacity="0.12" filter="url(#viafx)"/>
    <circle cx="283" cy="196" r="8" fill="#1A0A00" stroke="#FFB347" stroke-width="2"/>
    <circle cx="283" cy="196" r="4.5" fill="url(#gvia)"/>
    <circle cx="283" cy="196" r="1.8" fill="#FFE5A0"/>

    <!-- Via 2 haut-droit -->
    <circle cx="402" cy="185" r="9" fill="#FF6B00" fill-opacity="0.12" filter="url(#viafx)"/>
    <circle cx="402" cy="185" r="8" fill="#1A0A00" stroke="#FFB347" stroke-width="2"/>
    <circle cx="402" cy="185" r="4.5" fill="url(#gvia)"/>
    <circle cx="402" cy="185" r="1.8" fill="#FFE5A0"/>

    <!-- Via 3 gauche-milieu -->
    <circle cx="258" cy="282" r="9" fill="#FF6B00" fill-opacity="0.12" filter="url(#viafx)"/>
    <circle cx="258" cy="282" r="8" fill="#1A0A00" stroke="#FFB347" stroke-width="2"/>
    <circle cx="258" cy="282" r="4.5" fill="url(#gvia)"/>
    <circle cx="258" cy="282" r="1.8" fill="#FFE5A0"/>

    <!-- Via 4 droite-milieu -->
    <circle cx="432" cy="272" r="9" fill="#FF6B00" fill-opacity="0.12" filter="url(#viafx)"/>
    <circle cx="432" cy="272" r="8" fill="#1A0A00" stroke="#FFB347" stroke-width="2"/>
    <circle cx="432" cy="272" r="4.5" fill="url(#gvia)"/>
    <circle cx="432" cy="272" r="1.8" fill="#FFE5A0"/>

    <!-- Via 5 bas-gauche -->
    <circle cx="295" cy="348" r="9" fill="#FF6B00" fill-opacity="0.12" filter="url(#viafx)"/>
    <circle cx="295" cy="348" r="8" fill="#1A0A00" stroke="#FFB347" stroke-width="2"/>
    <circle cx="295" cy="348" r="4.5" fill="url(#gvia)"/>
    <circle cx="295" cy="348" r="1.8" fill="#FFE5A0"/>

    <!-- Via 6 bas-droit -->
    <circle cx="392" cy="342" r="9" fill="#FF6B00" fill-opacity="0.12" filter="url(#viafx)"/>
    <circle cx="392" cy="342" r="8" fill="#1A0A00" stroke="#FFB347" stroke-width="2"/>
    <circle cx="392" cy="342" r="4.5" fill="url(#gvia)"/>
    <circle cx="392" cy="342" r="1.8" fill="#FFE5A0"/>

    <!-- Pad central -->
    <circle cx="340" cy="242" r="14" fill="#FF6B00" fill-opacity="0.15" filter="url(#viafx)"/>
    <circle cx="340" cy="242" r="13" fill="#1A0A00" stroke="url(#ghex)" stroke-width="2.2"/>
    <circle cx="340" cy="242" r="7"  fill="url(#gvia)"/>
    <circle cx="340" cy="242" r="3"  fill="#FFE5A0"/>

  </g>

  <!-- Typography -->
  <text x="340" y="498"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="64" font-weight="900" letter-spacing="10"
    fill="url(#gtxt)">LEXART</text>

  <text x="340" y="536"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="22" font-weight="400" letter-spacing="20"
    fill="#FF8C2A" opacity="0.88">STUDIO</text>

  <line x1="195" y1="554" x2="485" y2="554" stroke="#FF6B00" stroke-width="0.8" stroke-opacity="0.3"/>
  <circle cx="195" cy="554" r="2.5" fill="#0AFFEF" opacity="0.85"/>
  <circle cx="485" cy="554" r="2.5" fill="#0AFFEF" opacity="0.85"/>

  <text x="340" y="580"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="13" font-weight="400" letter-spacing="5"
    fill="#FFB347" opacity="0.6">DÉVELOPPEUR FULLSTACK</text>

  <g stroke="#FF6B00" stroke-width="0.7" stroke-opacity="0.18">
    <line x1="255" y1="602" x2="295" y2="602"/>
    <line x1="385" y1="602" x2="425" y2="602"/>
  </g>
  <circle cx="340" cy="602" r="2" fill="#FF6B00" opacity="0.28"/>

</svg>
